name: Deploy to EC2
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Server Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            set -e

            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            REPO=${{ secrets.REPO }}

            # Update System Packages
            echo " Update and Upgrade the function"
            sudo apt update && sudo apt upgrade -y

            # Install Essential tools
            echo " Installing Essential tools..."
            sudo apt install -y git curl nginx build-essential

            # Install NVM
            if [ ! -d "$HOME/.nvm" ]; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            fi

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Install Node.js LTS
            echo " Install Node.js LTS"
            nvm install --lts
            nvm use --lts

            # Verify Installation
            echo "Verify Installation"
            node -v
            npm -v

            # Install PM2 globally
            echo "Install PM2 globally"
            npm install -g pm2


            # Install PostgreSQL
            echo "Install PostgreSQL"
            sudo apt install -y postgresql postgresql-contrib
            sudo systemctl start postgresql
            sudo systemctl enable postgresql


            # Create Database & User
            echo "Create Database & User"
             sudo systemctl start postgresql

            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER \"${DB_USER}\" WITH PASSWORD '${DB_PASS}';"

            # Grant CREATEDB privilege for Prisma Migrate shadow database
            sudo -u postgres psql -c "ALTER USER \"${DB_USER}\" CREATEDB;"

            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE \"${DB_NAME}\" OWNER \"${DB_USER}\";"

            # Clone or Update Repository
            echo "Clone or Update Repository"
            if [ ! -d "$HOME/${REPO}" ]; then
              cd ~
              git clone https://github.com/sunan-rabbi/${REPO}.git
            else
              cd $HOME/${REPO}
              git fetch origin
              git reset --hard origin/master
            fi
            cd $HOME/${REPO}

            # Setup Backend
            echo "Setup Backend"
            cd ~/${REPO}/backend
            npm install


            # Create Production Environment File
            echo "Environment File"
            sudo cp .env.example .env

            # Setup Prisma
            echo "Setup Prisma"
            npm run migrate
            npm run generate

            # Build the File
            echo "Build the file"
            npm run build


            # Setup Frontend
            echo "Setup Frontend"
            cd ~
            cd ${REPO}/frontend
            npm install

            # Create Production Environment File
            echo "Environment File"
            sudo cp .env.example .env

            # Build the File
            echo "Build the file"
            npm run build

            # Start the backend
            echo "Start the backend"
            pm2 delete server || true
            pm2 start ~/${REPO}/backend/dist/src/server.js --name server

            # Wait for server to start
            echo "Waiting for server to start..."
            sleep 5

            # Check status
            echo "Check status"
            pm2 status

            # Save PM2 process list
            echo "Save PM2 process list"
            pm2 save

            # Start Frontend with PM2
            cd ~/${REPO}/frontend
            pm2 delete client || true
            pm2 start npm --name "client" -- start
            pm2 save
            pm2 status

            # Wait for frontend to start
            echo "Waiting for frontend to start..."
            sleep 5

            # Test backend
            echo "Test backend"
            curl http://localhost:5000/health

            # Test Frontend
            echo "Test Frontend"
            curl http://localhost:3000

            # CREATE NGINX FILE

            echo "Creating nginx config file..."

            cat > nginx <<EOF
            server {

                listen 80;
                server_name ${{ secrets.EC2_HOST }};

                client_max_body_size 10M;
                client_body_timeout 60s;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;

                # Frontend (Next.js)
                location / {
                    proxy_pass http://localhost:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                # Backend API
                location /api/ {
                    proxy_pass http://localhost:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_set_header Origin \$http_origin;
                }

                # Next.js static files
                location /_next/static {
                    proxy_pass http://localhost:3001;
                    proxy_cache_valid 200 365d;
                    add_header Cache-Control "public, immutable";
                }
            }
            EOF

            # MOVE TO NGINX DIRECTORY

            sudo cp nginx /etc/nginx/sites-available/app

            # ENABLE SITE

            sudo ln -sf /etc/nginx/sites-available/app /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default

            # TEST & RESTART

            sudo nginx -t
            sudo systemctl restart nginx

            echo "Nginx configured successfully!"
